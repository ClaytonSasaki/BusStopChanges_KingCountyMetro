name: Deploy to GitHub Pages

on:
  workflow_run:
    workflows: ["Refresh alerts"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Build site
        run: |
          mkdir _site
          sed 's|\.\./data/active_alerts\.geojson|data/active_alerts.geojson|g' web/index.html > _site/index.html
          mkdir _site/data
          cp data/active_alerts.geojson _site/data/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
